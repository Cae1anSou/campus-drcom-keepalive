name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
      - run: cargo clippy --all-targets -- -D warnings

  build:
    name: Build ${{ matrix.target }}
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: campus-drcom-keepalive
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: campus-drcom-keepalive
          - os: macos-14
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: campus-drcom-keepalive
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: campus-drcom-keepalive.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package Unix
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cp README.md dist/
          cp .env.example dist/
          tar -C dist -czf campus-drcom-keepalive-${{ matrix.target }}.tar.gz .
      - name: Package Windows
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          Copy-Item README.md dist/
          Copy-Item .env.example dist/
          Compress-Archive -Path dist/* -DestinationPath campus-drcom-keepalive-${{ matrix.target }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: campus-drcom-keepalive-${{ matrix.target }}
          path: |
            campus-drcom-keepalive-${{ matrix.target }}.tar.gz
            campus-drcom-keepalive-${{ matrix.target }}.zip
          if-no-files-found: ignore

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
